name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build
        env:
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
          REACT_APP_FIREBASE_DATABASE_URL: ${{ secrets.REACT_APP_FIREBASE_DATABASE_URL }}
          REACT_APP_OPENAI_API_KEY: ${{ secrets.REACT_APP_OPENAI_API_KEY }}
          REACT_APP_PAYPAL_CLIENT_ID: ${{ secrets.REACT_APP_PAYPAL_CLIENT_ID }}
          REACT_APP_PAYPAL_TRIAL_BUTTON_ID: ${{ secrets.REACT_APP_PAYPAL_TRIAL_BUTTON_ID }}
          REACT_APP_PAYPAL_MONTHLY_BUTTON_ID: ${{ secrets.REACT_APP_PAYPAL_MONTHLY_BUTTON_ID }}
          REACT_APP_PAYPAL_YEARLY_BUTTON_ID: ${{ secrets.REACT_APP_PAYPAL_YEARLY_BUTTON_ID }}
          REACT_APP_STRIPE_ACCOUNT_ID: ${{ secrets.REACT_APP_STRIPE_ACCOUNT_ID }}
          REACT_APP_CURRENCY: ${{ secrets.REACT_APP_CURRENCY }}
          REACT_APP_TRIAL_PRICE: ${{ secrets.REACT_APP_TRIAL_PRICE }}
          REACT_APP_MONTHLY_PRICE: ${{ secrets.REACT_APP_MONTHLY_PRICE }}
          REACT_APP_YEARLY_PRICE: ${{ secrets.REACT_APP_YEARLY_PRICE }}
          REACT_APP_NAME: ${{ secrets.REACT_APP_NAME }}
          CI: false
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
