<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="theme-color" content="#2563EB" />
  <meta name="description" content="ATS Resume Builder - Create professional, ATS-friendly resumes with AI-powered optimization. Land more interviews with resumes that pass applicant tracking systems." />
  <meta name="keywords" content="resume builder, ATS resume, AI resume, professional resume, CV builder, job application, career" />
  <meta name="author" content="ATS Resume Builder" />
  
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="ATS Resume Builder - Create ATS-Friendly Resumes" />
  <meta property="og:description" content="AI-powered resume builder with ATS optimization. Create professional resumes that get you hired." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://YOUR_USERNAME.github.io/ats-resume-builder" />
  <meta property="og:image" content="%PUBLIC_URL%/logo.svg" />
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ATS Resume Builder" />
  <meta name="twitter:description" content="Create ATS-friendly resumes with AI optimization" />
  
  <!-- Favicon -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.svg" />
  
  <!-- Manifest for PWA -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Preload critical fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
  
  <title>ATS Resume Builder - AI-Powered Resume Creation</title>
  
  <style>
    /* Critical inline styles to prevent FOUC */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #F9FAFB;
    }
    
    #root {
      min-height: 100vh;
    }
    
    /* Loading state */
    .app-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .app-loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <noscript>
    <div style="text-align: center; padding: 50px; font-family: sans-serif;">
      <h1>JavaScript Required</h1>
      <p>You need to enable JavaScript to run this app.</p>
      <p>ATS Resume Builder requires JavaScript to provide its interactive resume building experience.</p>
    </div>
  </noscript>
  
  <div id="root">
    <!-- Loading state while React loads -->
    <div class="app-loading">
      <div class="app-loading-spinner"></div>
    </div>
  </div>
  
  <!-- 
    This HTML file is a template.
    Use `npm start` for development or `npm run build` for production.
    The build process will inject scripts and styles automatically.
  -->
</body>
</html>
