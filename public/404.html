<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Page Not Found - ATS Resume Builder</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: 20px;
    }
    
    .error-code {
      font-size: 120px;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    
    h1 {
      font-size: 24px;
      color: #1F2937;
      margin-bottom: 12px;
    }
    
    p {
      color: #6B7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    /* SPA redirect script */
    .redirect-message {
      margin-top: 16px;
      font-size: 14px;
      color: #9CA3AF;
    }
  </style>
  
  <script>
    // GitHub Pages SPA redirect
    (function() {
      // Get the current path
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Only redirect if not already at root and not a file request
      if (path !== '/' && !path.match(/\.[a-zA-Z]{2,4}$/)) {
        // Store the path for the SPA to handle
        sessionStorage.setItem('redirectPath', path + search + hash);
        // Redirect to root
        window.location.replace('/ats-resume-builder/' + '?redirect=' + encodeURIComponent(path + search + hash));
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>
      The page you're looking for doesn't exist or has been moved.
      Don't worry, you can go back to the homepage and continue building your resume.
    </p>
    <a href="/ats-resume-builder/" class="btn">Go to Homepage</a>
    <p class="redirect-message">
      Redirecting you to the homepage...
    </p>
  </div>
</body>
</html>
